name: .NET Core Desktop

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    strategy:
      matrix:
        configuration: [Release]

    runs-on: windows-latest

    env:
      Solution_Name: vPinEventMonitor\vPinEventMonitor.sln
      Project_Path: vPinEventMonitor\vPinEventMonitor\vPinEventMonitor.csproj
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore $env:Solution_Name

    - name: Build
      run: dotnet build $env:Solution_Name -c ${{ matrix.configuration }} --no-restore -p:Platform=x86

    - name: Publish
      run: dotnet publish $env:Project_Path -c ${{ matrix.configuration }} -r win-x86 --self-contained false -o publish/

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: vPinEventMonitor
        path: publish/
